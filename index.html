<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cannon Catastrophe</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Arial Black', sans-serif; }
        #hud { position: absolute; top: 20px; left: 20px; color: #ff0; pointer-events: none; text-shadow: 2px 2px #000; }
        #crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #0f0; font-size: 30px; pointer-events: none; opacity: 0.6; }
        #warning { position: absolute; top: 20%; width: 100%; text-align: center; color: #ff4444; font-size: 24px; display: none; animation: blink 0.5s infinite; }
        @keyframes blink { 0% { opacity: 0; } 50% { opacity: 1; } 100% { opacity: 0; } }
        .bar-cont { width: 200px; height: 15px; background: rgba(0,0,0,0.5); border: 2px solid #ff0; margin-top: 5px; }
        #hp-fill { height: 100%; background: #0f0; width: 100%; }
    </style>
</head>
<body>

<div id="hud">
    <h1 style="margin:0; font-size: 24px; italic">CANNON CATASTROPHE</h1>
    <div class="bar-cont"><div id="hp-fill"></div></div>
    <div style="margin-top:5px;">BASES: <span id="score-txt">0</span> | THREATS: <span id="kill-txt">0</span></div>
</div>

<div id="crosshair">⌖</div>
<div id="warning">MISSILE LOCK / BOGEY ON TAIL</div>

<script>
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x60a0ff);
scene.fog = new THREE.Fog(0x60a0ff, 100, 400);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 1, 1000);
const renderer = new THREE.WebGLRenderer({ antialias: false });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// --- LIGHTING ---
scene.add(new THREE.AmbientLight(0xffffff, 0.8));

// --- PLAYER JET ---
const jet = new THREE.Group();
const body = new THREE.Mesh(new THREE.BoxGeometry(1, 0.5, 4), new THREE.MeshStandardMaterial({color: 0x2c3e50}));
const wing = new THREE.Mesh(new THREE.BoxGeometry(5, 0.1, 1.5), new THREE.MeshStandardMaterial({color: 0x34495e}));
jet.add(body, wing);
scene.add(jet);

// --- GROUND (Infinite Tiling) ---
const groundGeo = new THREE.PlaneGeometry(2000, 2000, 10, 10);
const groundMat = new THREE.MeshStandardMaterial({ color: 0x3a5a40 });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
scene.add(ground);

// --- STATE ---
let hp = 100, score = 0, kills = 0, speed = 1.2;
let bullets = [], enemies = [], bases = [], keys = {};
let lastShot = 0;

function spawnBase() {
    const b = new THREE.Mesh(new THREE.BoxGeometry(10, 15, 10), new THREE.MeshStandardMaterial({color: 0x7f8c8d}));
    b.position.set(Math.random()*400-200, 7.5, jet.position.z - 400 - Math.random()*200);
    b.userData = { type: 'base', hp: 40 };
    scene.add(b);
    bases.push(b);
}

function spawnFighter() {
    const f = new THREE.Group();
    const fBody = new THREE.Mesh(new THREE.BoxGeometry(1, 0.5, 3), new THREE.MeshStandardMaterial({color: 0xc0392b}));
    f.add(fBody);
    f.position.set(Math.random()*100-50, Math.random()*30+10, jet.position.z - 300);
    f.userData = { type: 'fighter', hp: 20, lastFire: 0 };
    scene.add(f);
    enemies.push(f);
}

// Initial Spawns
for(let i=0; i<5; i++) spawnBase();
for(let i=0; i<2; i++) spawnFighter();

window.onkeydown = (e) => keys[e.code] = true;
window.onkeyup = (e) => keys[e.code] = false;

function fire(isEnemy, source) {
    const b = new THREE.Mesh(new THREE.SphereGeometry(0.3), new THREE.MeshBasicMaterial({color: isEnemy ? 0xff0000 : 0xffff00}));
    b.position.copy(source.position);
    b.userData = { 
        vel: new THREE.Vector3(0, 0, isEnemy ? 1.5 : -2.5),
        isEnemy: isEnemy
    };
    bullets.push(b);
    scene.add(b);
}

function update() {
    // Steer & Pitch
    if (keys['KeyW']) jet.position.y += 0.4;
    if (keys['KeyS']) jet.position.y -= 0.4;
    if (keys['KeyA']) { jet.position.x -= 0.5; jet.rotation.z = 0.3; }
    else if (keys['KeyD']) { jet.position.x += 0.5; jet.rotation.z = -0.3; }
    else { jet.rotation.z = 0; }

    if (keys['Space'] && Date.now() - lastShot > 120) {
        fire(false, jet);
        lastShot = Date.now();
    }

    jet.position.z -= speed;
    ground.position.z = jet.position.z;

    // Camera
    camera.position.set(jet.position.x, jet.position.y + 3, jet.position.z + 10);
    camera.lookAt(jet.position.x, jet.position.y, jet.position.z - 20);

    // Bullet Logic
    bullets.forEach((b, i) => {
        b.position.add(b.userData.vel);
        
        // Player hitting things
        if(!b.userData.isEnemy) {
            [...bases, ...enemies].forEach((target, ti) => {
                if(b.position.distanceTo(target.position) < 8) {
                    target.userData.hp -= 10;
                    scene.remove(b); bullets.splice(i, 1);
                    if(target.userData.hp <= 0) {
                        if(target.userData.type === 'base') { score++; spawnBase(); }
                        else { kills++; spawnFighter(); }
                        scene.remove(target);
                        if(target.userData.type === 'base') bases.splice(bases.indexOf(target), 1);
                        else enemies.splice(enemies.indexOf(target), 1);
                        document.getElementById('score-txt').innerText = score;
                        document.getElementById('kill-txt').innerText = kills;
                    }
                }
            });
        } else {
            // Enemy hitting player
            if(b.position.distanceTo(jet.position) < 2) {
                hp -= 10;
                scene.remove(b); bullets.splice(i, 1);
                document.getElementById('hp-fill').style.width = hp + "%";
                if(hp <= 0) location.reload();
            }
        }
    });

    // Enemy AI
    let warning = false;
    enemies.forEach(f => {
        // Move towards player's tail
        const targetPos = new THREE.Vector3(jet.position.x, jet.position.y, jet.position.z + 20);
        f.position.lerp(targetPos, 0.02);
        f.lookAt(jet.position);
        
        if(f.position.distanceTo(jet.position) < 40) {
            warning = true;
            if(Date.now() - f.userData.lastFire > 1000) {
                fire(true, f);
                f.userData.lastFire = Date.now();
            }
        }
    });
    document.getElementById('warning').style.display = warning ? 'block' : 'none';

    // Ground/Height check
    if(jet.position.y < 0) { hp -= 2; document.getElementById('hp-fill').style.width = hp + "%"; if(hp <= 0) location.reload(); }
}

function animate() {
    requestAnimationFrame(animate);
    update();
    renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
