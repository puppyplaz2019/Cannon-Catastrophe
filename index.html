<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cannon Catastrophe | SOLID CITY</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Arial Black', sans-serif; }
        #hud { position: absolute; top: 20px; left: 20px; color: #ff0; pointer-events: none; text-shadow: 2px 2px #000; z-index: 10; }
        #crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #0f0; font-size: 30px; pointer-events: none; opacity: 0.6; }
        #warning { position: absolute; top: 20%; width: 100%; text-align: center; color: #ff4444; font-size: 24px; display: none; animation: blink 0.5s infinite; }
        @keyframes blink { 0% { opacity: 0; } 50% { opacity: 1; } 100% { opacity: 0; } }
        .bar-cont { width: 200px; height: 15px; background: rgba(0,0,0,0.5); border: 2px solid #ff0; margin-top: 5px; }
        #hp-fill { height: 100%; background: #0f0; width: 100%; transition: width 0.2s; }
    </style>
</head>
<body>

<div id="hud">
    <h1 style="margin:0; font-size: 24px; font-style: italic;">CANNON CATASTROPHE</h1>
    <div class="bar-cont"><div id="hp-fill"></div></div>
    <div style="margin-top:5px;">SCORE: <span id="score-txt">0</span> | KILLS: <span id="kill-txt">0</span></div>
</div>

<div id="crosshair">⌖</div>
<div id="warning">MISSILE LOCK / BOGEY ON TAIL</div>

<script>
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x60a0ff);
scene.fog = new THREE.Fog(0x60a0ff, 100, 500);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ antialias: false });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// --- LIGHTING ---
const sun = new THREE.DirectionalLight(0xffffff, 1);
sun.position.set(5, 10, 7);
scene.add(sun);
scene.add(new THREE.AmbientLight(0xffffff, 0.6));

// --- PLAYER JET ---
const jet = new THREE.Group();
const body = new THREE.Mesh(new THREE.BoxGeometry(1, 0.5, 4), new THREE.MeshStandardMaterial({color: 0x2c3e50}));
const wing = new THREE.Mesh(new THREE.BoxGeometry(5, 0.1, 1.5), new THREE.MeshStandardMaterial({color: 0x34495e}));
const tail = new THREE.Mesh(new THREE.BoxGeometry(0.1, 1, 1), new THREE.MeshStandardMaterial({color: 0x34495e}));
tail.position.set(0, 0.5, -1.5);
jet.add(body, wing, tail);
jet.position.y = 10;
scene.add(jet);

// --- GROUND (Infinite Tiling) ---
const groundGeo = new THREE.PlaneGeometry(2000, 2000);
const groundMat = new THREE.MeshStandardMaterial({ color: 0x222222 }); // Darker asphalt look
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
scene.add(ground);

// --- STATE ---
let hp = 100, score = 0, kills = 0, speed = 1.5;
let bullets = [], enemies = [], bases = [], keys = {};
let lastShot = 0;

// --- DYNAMIC BUILDING GENERATION ---
function spawnBase() {
    const w = Math.random() * 15 + 5;
    const h = Math.random() * 40 + 10;
    const d = Math.random() * 15 + 5;
    
    const bGeo = new THREE.BoxGeometry(w, h, d);
    const bMat = new THREE.MeshStandardMaterial({color: 0x444444});
    const b = new THREE.Mesh(bGeo, bMat);
    
    // Add "Windows" (Glowy bits)
    const winGeo = new THREE.BoxGeometry(w + 0.1, h * 0.8, d + 0.1);
    const winMat = new THREE.MeshBasicMaterial({color: 0xffff00, wireframe: true, opacity: 0.1, transparent: true});
    const wins = new THREE.Mesh(winGeo, winMat);
    b.add(wins);

    b.position.set(Math.random()*600-300, h/2, jet.position.z - 500 - Math.random()*300);
    b.userData = { type: 'base', hp: 50, width: w, height: h, depth: d };
    scene.add(b);
    bases.push(b);
}

function spawnFighter() {
    const f = new THREE.Group();
    const fBody = new THREE.Mesh(new THREE.BoxGeometry(1.5, 0.5, 3), new THREE.MeshStandardMaterial({color: 0xc0392b}));
    f.add(fBody);
    f.position.set(Math.random()*200-100, Math.random()*50+20, jet.position.z - 400);
    f.userData = { type: 'fighter', hp: 20, lastFire: 0 };
    scene.add(f);
    enemies.push(f);
}

// Initial Spawns
for(let i=0; i<15; i++) spawnBase();
for(let i=0; i<3; i++) spawnFighter();

window.onkeydown = (e) => keys[e.code] = true;
window.onkeyup = (e) => keys[e.code] = false;

function fire(isEnemy, source) {
    const b = new THREE.Mesh(new THREE.SphereGeometry(0.4), new THREE.MeshBasicMaterial({color: isEnemy ? 0xff0000 : 0x00ffff}));
    b.position.copy(source.position);
    b.userData = { 
        vel: new THREE.Vector3(0, 0, isEnemy ? 2.5 : -4),
        isEnemy: isEnemy,
        life: 100
    };
    bullets.push(b);
    scene.add(b);
}

function update() {
    // Steer & Pitch
    if (keys['KeyW']) jet.position.y += 0.5;
    if (keys['KeyS']) jet.position.y -= 0.5;
    if (keys['KeyA']) { jet.position.x -= 0.7; jet.rotation.z = 0.4; }
    else if (keys['KeyD']) { jet.position.x += 0.7; jet.rotation.z = -0.4; }
    else { jet.rotation.z *= 0.9; }

    if (keys['Space'] && Date.now() - lastShot > 100) {
        fire(false, jet);
        lastShot = Date.now();
    }

    jet.position.z -= speed;
    ground.position.z = jet.position.z;

    // --- SOLID GROUND PHYSICS ---
    if (jet.position.y < 0.25) {
        jet.position.y = 0.25; // Don't fall through ground
        // You only take damage if you are really "dragging"
        if (Math.abs(jet.rotation.z) > 0.1) {
            hp -= 0.5;
        }
    }

    // Camera follow
    camera.position.set(jet.position.x, jet.position.y + 3, jet.position.z + 12);
    camera.lookAt(jet.position.x, jet.position.y + 1, jet.position.z - 20);

    // Bullet Logic
    for(let i = bullets.length - 1; i >= 0; i--) {
        let b = bullets[i];
        b.position.add(b.userData.vel);
        b.userData.life--;

        if(b.userData.life <= 0) {
            scene.remove(b); bullets.splice(i, 1); continue;
        }
        
        if(!b.userData.isEnemy) {
            // Player hitting Bases/Enemies
            [...bases, ...enemies].forEach((target) => {
                if(b.position.distanceTo(target.position) < 10) {
                    target.userData.hp -= 10;
                    b.userData.life = 0;
                    if(target.userData.hp <= 0) {
                        if(target.userData.type === 'base') { score += 10; spawnBase(); bases.splice(bases.indexOf(target), 1); }
                        else { kills++; spawnFighter(); enemies.splice(enemies.indexOf(target), 1); }
                        scene.remove(target);
                        document.getElementById('score-txt').innerText = score;
                        document.getElementById('kill-txt').innerText = kills;
                    }
                }
            });
        } else {
            // Enemy hitting player
            if(b.position.distanceTo(jet.position) < 2.5) {
                hp -= 5;
                b.userData.life = 0;
                document.getElementById('hp-fill').style.width = hp + "%";
                if(hp <= 0) location.reload();
            }
        }
    }

    // Enemy AI
    let warning = false;
    enemies.forEach(f => {
        const targetPos = new THREE.Vector3(jet.position.x, jet.position.y + 2, jet.position.z + 30);
        f.position.lerp(targetPos, 0.03);
        f.lookAt(jet.position);
        
        if(f.position.distanceTo(jet.position) < 60) {
            warning = true;
            if(Date.now() - f.userData.lastFire > 1500) {
                fire(true, f);
                f.userData.lastFire = Date.now();
            }
        }

        // Clean up old enemies behind player
        if(f.position.z > jet.position.z + 50) {
            f.position.z = jet.position.z - 400;
        }
    });
    
    // Clean up old buildings behind player
    bases.forEach(b => {
        if(b.position.z > jet.position.z + 100) {
            b.position.z = jet.position.z - 600;
            b.userData.hp = 50; // Reset building
        }
        // BUILDING COLLISION
        if(jet.position.distanceTo(b.position) < 8) {
            hp -= 100; // Crash
            location.reload();
        }
    });

    document.getElementById('warning').style.display = warning ? 'block' : 'none';
}

function animate() {
    requestAnimationFrame(animate);
    update();
    renderer.render(scene, camera);
}
animate();

// Handle Resizing
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
